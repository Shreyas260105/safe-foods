services:
  - type: web
    name: safebite
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py seed_data
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: safebite.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: safebite-db
          property: connectionString
      - key: CLOUD_STORAGE_PROVIDER
        value: local
      - key: OCR_PROVIDER
        value: tesseract

databases:
  - name: safebite-db
    plan: free
